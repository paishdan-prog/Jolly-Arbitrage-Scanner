<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jolly Arbitrage Scanner</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#0f172a;

color:white;

padding:20px;

}

.container{

max-width:900px;

margin:auto;

}

.card{

background:#1e293b;

padding:20px;

border-radius:12px;

margin-bottom:20px;

box-shadow:0 0 10px rgba(0,0,0,.3);

}

h1{

text-align:center;

margin-bottom:10px;

}

.status{

text-align:center;

font-size:18px;

color:#22c55e;

margin-bottom:20px;

}

table{

width:100%;

border-collapse:collapse;

}

th{

background:#334155;

padding:12px;

}

td{

padding:12px;

text-align:center;

border-bottom:1px solid #475569;

}

button{

width:100%;

padding:15px;

font-size:18px;

background:#2563eb;

color:white;

border:none;

border-radius:10px;

cursor:pointer;

margin-top:20px;

}

button:hover{

background:#1d4ed8;

}

.best{

font-size:22px;

text-align:center;

color:#22c55e;

margin-top:15px;

}

.profit{

font-size:35px;

font-weight:bold;

text-align:center;

margin-top:10px;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>🚀 Jolly Arbitrage Scanner</h1>

<div class="status">

🟢 Online

</div>

<table>

<tr>

<th>Exchange</th>

<th>Buy</th>

<th>Sell</th>

</tr>

<tr>

<td>Binance</td>

<td id="binanceBuy">Loading...</td>

<td id="binanceSell">Loading...</td>

</tr>

<tr>

<td>Bybit</td>

<td id="bybitBuy">Loading...</td>

<td id="bybitSell">Loading...</td>

</tr>

<tr>

<td>OKX</td>

<td id="okxBuy">Loading...</td>

<td id="okxSell">Loading...</td>

</tr>

</table>

<div class="best">

🔥 Best Opportunity

</div>

<div id="opportunity" class="profit">

Loading...

</div>

<button onclick="loadPrices()">

Refresh Prices

</button>

</div> 
<script>

async function loadPrices(){

// Demo prices for Version 2.
// We'll replace these with live exchange data next.

const prices = {

binance:{
buy:1595,
sell:1602
},

bybit:{
buy:1608,
sell:1618
},

okx:{
buy:1601,
sell:1610
}

};

document.getElementById("binanceBuy").innerHTML="₦"+prices.binance.buy;
document.getElementById("binanceSell").innerHTML="₦"+prices.binance.sell;

document.getElementById("bybitBuy").innerHTML="₦"+prices.bybit.buy;
document.getElementById("bybitSell").innerHTML="₦"+prices.bybit.sell;

document.getElementById("okxBuy").innerHTML="₦"+prices.okx.buy;
document.getElementById("okxSell").innerHTML="₦"+prices.okx.sell;

// Find best buy

let exchanges=[
{name:"Binance",buy:prices.binance.buy,sell:prices.binance.sell},
{name:"Bybit",buy:prices.bybit.buy,sell:prices.bybit.sell},
{name:"OKX",buy:prices.okx.buy,sell:prices.okx.sell}
];

let cheapest=exchanges[0];
let highest=exchanges[0];

for(let e of exchanges){

if(e.buy<cheapest.buy)
cheapest=e;

if(e.sell>highest.sell)
highest=e;

}

let spread=highest.sell-cheapest.buy;

let percent=((spread/cheapest.buy)*100).toFixed(2);

document.getElementById("opportunity").innerHTML=

`Buy on ${cheapest.name}<br>
Sell on ${highest.name}<br><br>
Spread: ₦${spread}<br>
Profit: ${percent}%`;

}

loadPrices();

</script>

</body>

</html>

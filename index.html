<!DOCTYPE html>
<html>
<head>
    <title>Jolly Arbitrage Scanner</title>
</head>

<body>

<h1>🚀 Jolly Arbitrage Scanner</h1>

<p>Scanner Status:
<span id="status">Loading...</span>
</p>

<h2>Price Comparison</h2>

<table border="1" cellpadding="10">
<tr>
<th>Exchange</th>
<th>BTC Price (USDT)</th>
</tr>

<tr>
<td>Binance</td>
<td id="binance">Loading...</td>
</tr>

<tr>
<td>Bybit</td>
<td id="bybit">Loading...</td>
</tr>

</table>

<script>

async function loadPrices(){

const binance=await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");
const b=await binance.json();

const bybit=await fetch("https://api.bybit.com/v5/market/tickers?category=spot&symbol=BTCUSDT");
const y=await bybit.json();

document.getElementById("binance").innerHTML=b.price;

document.getElementById("bybit").innerHTML=y.result.list[0].lastPrice;

document.getElementById("status").innerHTML="Live";

}

loadPrices();

setInterval(loadPrices,10000);

</script>

</body>
</html>

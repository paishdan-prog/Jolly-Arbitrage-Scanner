
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jolly Arbitrage Scanner PRO</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:20px;
}

h1{
text-align:center;
font-size:42px;
}

.status{
text-align:center;
font-size:26px;
color:#22c55e;
margin-bottom:20px;
}

.clock{
text-align:center;
font-size:20px;
margin-bottom:20px;
color:#94a3b8;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#334155;
padding:15px;
}

td{
padding:15px;
border-bottom:1px solid #475569;
text-align:center;
}

.best{
text-align:center;
margin-top:30px;
font-size:28px;
color:#22c55e;
}

#recommendation{
font-size:50px;
font-weight:bold;
text-align:center;
margin-top:15px;
}

#profit{
font-size:40px;
text-align:center;
margin-top:20px;
}

button{
width:100%;
padding:20px;
font-size:28px;
background:#2563eb;
color:white;
border:none;
border-radius:12px;
margin-top:25px;
}

.loading{
animation:pulse 1s infinite;
}

@keyframes pulse{

0%{opacity:.4;}

50%{opacity:1;}

100%{opacity:.4;}

}

</style>

</head>

<body>

<div class="container">

<h1>🚀 Jolly Arbitrage Scanner PRO</h1>

<div class="status">
🟢 LIVE
</div>

<div class="clock" id="clock"></div>

<table>

<tr>

<th>Exchange</th>

<th>Buy</th>

<th>Sell</th>

</tr>

<tr>

<td>Binance</td>

<td id="binanceBuy">Loading...</td>

<td id="binanceSell">Loading...</td>

</tr>

<tr>

<td>Bybit</td>

<td id="bybitBuy">Loading...</td>

<td id="bybitSell">Loading...</td>

</tr>

<tr>

<td>OKX</td>

<td id="okxBuy">Loading...</td>

<td id="okxSell">Loading...</td>

</tr>

</table>

<div class="best">

🔥 BEST OPPORTUNITY

</div>

<div id="recommendation">

Loading...

</div>

<div id="profit">

Calculating...

</div>

<button onclick="loadPrices()">

Refresh Prices

</button> </div>

<script>

function updateClock(){

const now = new Date();

document.getElementById("clock").innerHTML =
now.toLocaleTimeString();

}

setInterval(updateClock,1000);

updateClock();

async function loadPrices(){

document.getElementById("recommendation").innerHTML="Scanning...";
document.getElementById("profit").innerHTML="Checking opportunities...";

const prices={

binance:{
buy:1595,
sell:1602
},

bybit:{
buy:1608,
sell:1618
},

okx:{
buy:1601,
sell:1610
}

};

document.getElementById("binanceBuy").innerHTML="₦"+prices.binance.buy;
document.getElementById("binanceSell").innerHTML="₦"+prices.binance.sell;

document.getElementById("bybitBuy").innerHTML="₦"+prices.bybit.buy;
document.getElementById("bybitSell").innerHTML="₦"+prices.bybit.sell;

document.getElementById("okxBuy").innerHTML="₦"+prices.okx.buy;
document.getElementById("okxSell").innerHTML="₦"+prices.okx.sell;

calculateOpportunity(prices);

}

function calculateOpportunity(data){

let exchanges=[];

for(let name in data){

exchanges.push({

name:name,

buy:data[name].buy,

sell:data[name].sell

});

}

let cheapest=exchanges[0];
let highest=exchanges[0];

exchanges.forEach(e=>{

if(e.buy<cheapest.buy) cheapest=e;

if(e.sell>highest.sell) highest=e;

});

const spread=highest.sell-cheapest.buy;

const percent=((spread/cheapest.buy)*100).toFixed(2);

document.getElementById("recommendation").innerHTML=

"Buy on <br><b>"+cheapest.name.toUpperCase()+"</b><br>Sell on <br><b>"+highest.name.toUpperCase()+"</b>";

document.getElementById("profit").innerHTML=

"Spread: ₦"+spread+"<br>Profit: "+percent+"%";

}

loadPrices();

setInterval(loadPrices,10000);

</script>

</body>

</html>
